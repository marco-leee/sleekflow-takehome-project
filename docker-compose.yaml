services:
  postgres:
    image: postgres:18
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sleekflow
    volumes:
      - sleekflow-data:/var/lib/postgresql
    restart: unless-stopped

networks:
  sleekflow:
    driver: bridge

volumes:
  sleekflow-data:
    driver: local